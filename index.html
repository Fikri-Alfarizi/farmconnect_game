<body
    style="background: url('./images/background.png'); background-size: cover; margin: 0; padding: 0; overflow: hidden;">
    <ul id="debugDashboard"
        style="background-color: rgba(255,255,255,0.8); width: 20%; position: fixed; top: 0; left: 0; z-index: 100; list-style: none; margin: 0; padding: 5px; font-family: sans-serif; font-size: 12px; pointer-events: none;">
    </ul>

    <div
        style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;">
        <canvas id="gameWorld" width="960" height="768" tabindex="0" autofocus
            style="background: black; border: 4px solid #4a2f1b; box-shadow: 0 0 30px rgba(0,0,0,0.7); outline: none;"
            oncontextmenu="return false;"></canvas>

        <div style="display: none;">
            <input id="debug" onclick="Debugger.switchDebugMode()" type="checkbox">
            <input id="mute" type="checkbox">
            <input id="volume" max="1" min="0" step="0.1" type="range" value="0.1">
        </div>
    </div>
